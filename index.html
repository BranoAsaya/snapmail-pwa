<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SnapMail">
    <link rel="manifest" href="manifest.json">
    <title>SnapMail PWA</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --danger-color: #ff3b30;
            --safe-area-inset-top: env(safe-area-inset-top);
            --safe-area-inset-bottom: env(safe-area-inset-bottom);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden;
        }
        #camera-container { position: relative; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; display: block; }
        .top-bar {
            position: absolute; top: 0; left: 0; right: 0;
            padding: calc(var(--safe-area-inset-top) + 10px) 20px 10px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
            z-index: 10;
        }
        .app-name { font-variant: small-caps; font-weight: 700; letter-spacing: 1px; font-size: 18px; }
        .top-actions { display: flex; gap: 24px; align-items: center; }
        .icon-btn {
            background: none; border: none; padding: 0; cursor: pointer;
            color: white; font-size: 24px; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border-radius: 50%;
            transition: background 0.15s;
        }
        .icon-btn:active { background: rgba(255,255,255,0.15); }
        #send-btn { font-size: 22px; min-width: 44px; }
        #send-btn.sending {
            border: 2px solid rgba(255,255,255,0.4);
            animation: pulse 1s ease-in-out infinite;
            font-size: 13px; font-weight: 700;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .bottom-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 20px 40px calc(var(--safe-area-inset-bottom) + 30px);
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to top, rgba(0,0,0,0.55), transparent);
            z-index: 10;
        }
        .thumbnail-preview {
            width: 56px; height: 56px; border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.3);
            background-size: cover; background-position: center;
            cursor: pointer; background-color: #1a1a1a;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .shutter-btn {
            width: 72px; height: 72px; border-radius: 50%;
            border: 4px solid white; background: transparent;
            display: flex; align-items: center; justify-content: center;
            padding: 4px; cursor: pointer;
        }
        .shutter-inner {
            width: 100%; height: 100%; border-radius: 50%;
            background: white; transition: transform 0.1s;
        }
        .shutter-btn:active .shutter-inner { transform: scale(0.88); }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 100;
            display: none; flex-direction: column;
            padding: calc(var(--safe-area-inset-top) + 20px) 20px calc(var(--safe-area-inset-bottom) + 20px);
        }
        .overlay.active { display: flex; }
        .overlay-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; flex-shrink: 0;
        }
        .overlay-title { font-size: 18px; font-weight: 600; }
        .gallery-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 2px; overflow-y: auto; flex-grow: 1;
        }
        .gallery-item { aspect-ratio: 1; position: relative; background: #1a1a1a; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .delete-badge {
            position: absolute; top: 5px; right: 5px;
            background: var(--danger-color); color: white;
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; font-weight: bold; cursor: pointer;
        }
        .settings-form { display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 12px; text-transform: uppercase; opacity: 0.6; letter-spacing: 0.5px; }
        input {
            background: #1a1a1a; border: 1px solid #333; color: white;
            padding: 12px; border-radius: 8px; font-size: 16px; width: 100%;
        }
        .btn-primary {
            background: white; color: black; border: none;
            padding: 15px; border-radius: 8px; font-weight: 600;
            font-size: 16px; cursor: pointer; width: 100%;
        }
        .dialog-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 200;
            display: none; align-items: center; justify-content: center; padding: 40px;
        }
        .dialog-overlay.active { display: flex; }
        .dialog-card {
            background: #1c1c1e; width: 100%; border-radius: 14px;
            padding: 24px; text-align: center;
        }
        .dialog-card h3 { margin-top: 0; margin-bottom: 12px; }
        .dialog-card p { white-space: pre-line; opacity: 0.8; margin: 0; line-height: 1.6; }
        .dialog-btns { display: flex; gap: 10px; margin-top: 20px; }
        .dialog-btns button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 16px; cursor: pointer; }
        .btn-cancel { background: #3a3a3c; color: white; }
        .btn-confirm { background: white; color: black; font-weight: 600; }
        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 99;
        }
        @keyframes flash-anim { 0%{opacity:0} 50%{opacity:1} 100%{opacity:0} }
        .do-flash { animation: flash-anim 120ms ease-out; }
        #error-card {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 400;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px; text-align: center; gap: 20px;
        }
        #error-card.active { display: flex; }
        #error-card p { opacity: 0.7; line-height: 1.6; }
    </style>
</head>
<body>

<div id="camera-container">
    <video id="viewfinder" autoplay playsinline muted></video>
    <div class="top-bar">
        <div class="app-name">SnapMail</div>
        <div class="top-actions">
            <button id="send-btn" class="icon-btn" onclick="openSendDialog()" title="Send">📤</button>
            <button class="icon-btn" onclick="toggleOverlay('settings-overlay', true)" title="Settings">⚙️</button>
        </div>
    </div>
    <div class="bottom-bar">
        <div id="last-thumb" class="thumbnail-preview" onclick="openGallery()" title="Gallery">📷</div>
        <button class="shutter-btn" onclick="capturePhoto()" title="Capture">
            <div class="shutter-inner"></div>
        </button>
        <button class="icon-btn" onclick="flipCamera()" title="Flip" style="font-size:28px;">🔄</button>
    </div>
</div>

<div id="flash"></div>

<div id="error-card">
    <div style="font-size:56px;">📷</div>
    <h2 style="margin:0">Camera Access Required</h2>
    <p>Allow camera access in your browser settings,<br>then tap Retry.</p>
    <button class="btn-primary" style="max-width:200px" onclick="retryCamera()">🔄 Retry</button>
</div>

<div id="gallery-overlay" class="overlay">
    <div class="overlay-header">
        <div id="gallery-title" class="overlay-title">🖼️ Gallery</div>
        <button class="icon-btn" onclick="toggleOverlay('gallery-overlay', false)" style="font-size:28px;">✕</button>
    </div>
    <div id="gallery-grid" class="gallery-grid"></div>
</div>

<div id="settings-overlay" class="overlay">
    <div class="overlay-header">
        <div class="overlay-title">⚙️ Settings</div>
        <button class="icon-btn" onclick="toggleOverlay('settings-overlay', false)" style="font-size:28px;">✕</button>
    </div>
    <div class="settings-form">
        <div id="settings-notice" style="color:var(--danger-color);font-size:14px;padding:10px;background:#1a1a1a;border-radius:8px;display:none;">
            ⚠️ Configure your settings before capturing.
        </div>
        <div class="form-group">
            <label>📧 Target Email</label>
            <input type="email" id="set-email" placeholder="email@example.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label>📁 Album / Subject Name</label>
            <input type="text" id="set-album" placeholder="My Snapshots">
        </div>
        <button class="btn-primary" onclick="saveSettings()">✅ Save Settings</button>
    </div>
</div>

<div id="send-dialog" class="dialog-overlay">
    <div class="dialog-card">
        <h3>📤 Send Batch</h3>
        <p id="send-stats"></p>
        <div class="dialog-btns">
            <button class="btn-cancel" onclick="toggleOverlay('send-dialog', false)">✕ Cancel</button>
            <button class="btn-confirm" onclick="processSend()">📤 Send All</button>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxgqzjDRquoBW442aNbXuMvaFyKq7mqSqYDzSYzn2LE-MtzJQk25B_MrX73VEN_D4Tr/exec";
    const SAFE_BATCH_BYTES = 18 * 1024 * 1024;
    let db, currentStream, currentFacingMode = "environment";

    async function initDB() {
        return new Promise((resolve, reject) => {
            const r = indexedDB.open("snapmail_db", 2);
            r.onupgradeneeded = (e) => {
                const d = e.target.result;
                if (!d.objectStoreNames.contains("photos")) {
                    const s = d.createObjectStore("photos", { keyPath: "id" });
                    s.createIndex("timestamp", "timestamp");
                }
                if (!d.objectStoreNames.contains("send_queue"))
                    d.createObjectStore("send_queue", { keyPath: "id" });
            };
            r.onsuccess = (e) => { db = e.target.result; resolve(); };
            r.onerror = reject;
        });
    }

    function dbReq(req) {
        return new Promise((res, rej) => {
            req.onsuccess = () => res(req.result);
            req.onerror  = () => rej(req.error);
        });
    }

    async function initCamera() {
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        const constraints = [
            { video: { facingMode: currentFacingMode, width: { ideal: 4096 } } },
            { video: { facingMode: currentFacingMode } },
            { video: true }
        ];
        for (const c of constraints) {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia(c);
                document.getElementById('viewfinder').srcObject = currentStream;
                document.getElementById('error-card').classList.remove('active');
                return;
            } catch {}
        }
        document.getElementById('error-card').classList.add('active');
    }

    function retryCamera() { document.getElementById('error-card').classList.remove('active'); initCamera(); }
    function flipCamera()  { currentFacingMode = currentFacingMode === "environment" ? "user" : "environment"; initCamera(); }

    async function capturePhoto() {
        const video = document.getElementById('viewfinder');
        if (!video.videoWidth) return;
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob(async (blob) => {
            if (!blob) return;
            const record = { id: crypto.randomUUID(), blob, sizeBytes: blob.size, timestamp: Date.now() };
            await new Promise((res, rej) => {
                const tx = db.transaction("photos", "readwrite");
                const req = tx.objectStore("photos").add(record);
                req.onsuccess = res; req.onerror = rej;
            });
            const flash = document.getElementById('flash');
            flash.classList.remove('do-flash');
            void flash.offsetWidth;
            flash.classList.add('do-flash');
            const thumb = document.getElementById('last-thumb');
            const url = URL.createObjectURL(blob);
            thumb.style.backgroundImage = `url(${url})`;
            thumb.textContent = '';
        }, 'image/jpeg', 1.0);
    }

    async function openGallery() {
        const photos = await dbReq(db.transaction("photos","readonly").objectStore("photos").index("timestamp").getAll());
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = '';
        let totalSize = 0;
        photos.forEach(p => {
            totalSize += p.sizeBytes;
            const div = document.createElement('div');
            div.className = 'gallery-item';
            const img = document.createElement('img');
            const objUrl = URL.createObjectURL(p.blob);
            img.src = objUrl;
            img.onload = () => URL.revokeObjectURL(objUrl);
            const del = document.createElement('div');
            del.className = 'delete-badge'; del.textContent = '×';
            del.onclick = (e) => { e.stopPropagation(); deletePhoto(p.id); };
            div.appendChild(img); div.appendChild(del); grid.appendChild(div);
        });
        document.getElementById('gallery-title').innerText =
            `🖼️ Gallery (${photos.length} • ${(totalSize/1024/1024).toFixed(2)} MB)`;
        toggleOverlay('gallery-overlay', true);
    }

    async function deletePhoto(id) {
        await new Promise((res, rej) => {
            const req = db.transaction("photos","readwrite").objectStore("photos").delete(id);
            req.onsuccess = res; req.onerror = rej;
        });
        openGallery();
    }

    function buildBatches(records) {
        records.sort((a, b) => a.timestamp - b.timestamp);
        let batches = [], batch = [], size = 0;
        for (const r of records) {
            if ((size + r.sizeBytes) > SAFE_BATCH_BYTES && batch.length > 0) {
                batches.push(batch); batch = [r]; size = r.sizeBytes;
            } else { batch.push(r); size += r.sizeBytes; }
        }
        if (batch.length > 0) batches.push(batch);
        return batches;
    }

    function updateSendBtn(state, current, total) {
        const btn = document.getElementById('send-btn');
        btn.disabled = false;
        btn.classList.remove('sending');
        if      (state === 'preparing') { btn.textContent = '⏳'; btn.disabled = true; }
        else if (state === 'sending')   { btn.textContent = `${current}/${total}`; btn.classList.add('sending'); btn.disabled = true; }
        else if (state === 'queued')    { btn.textContent = '📨'; }
        else if (state === 'done')      { btn.textContent = '✅'; setTimeout(() => { btn.textContent = '📤'; }, 3000); }
        else if (state === 'error')     { btn.textContent = '❌'; setTimeout(() => { btn.textContent = '📤'; }, 3000); }
        else                            { btn.textContent = '📤'; }
    }

    async function openSendDialog() {
        const photos = await dbReq(db.transaction("photos","readonly").objectStore("photos").getAll());
        if (!photos.length) { alert("No photos to send."); return; }
        const batches = buildBatches(photos);
        const totalSize = photos.reduce((a, p) => a + p.sizeBytes, 0);
        document.getElementById('send-stats').innerText =
            `${photos.length} photos  •  ${(totalSize/1024/1024).toFixed(2)} MB\nWill send in ${batches.length} email(s).`;
        toggleOverlay('send-dialog', true);
    }

    async function processSend() {
        const settings = JSON.parse(localStorage.getItem('snapmail_settings') || '{}');
        if (!settings.email) {
            alert("Please configure your email in Settings first.");
            toggleOverlay('send-dialog', false);
            toggleOverlay('settings-overlay', true);
            return;
        }
        toggleOverlay('send-dialog', false);
        updateSendBtn('preparing');

        const photos  = await dbReq(db.transaction("photos","readonly").objectStore("photos").getAll());
        const batches = buildBatches(photos);

        for (let i = 0; i < batches.length; i++) {
            const images = await Promise.all(batches[i].map(async (p) => {
                const b64 = await new Promise(res => {
                    const reader = new FileReader();
                    reader.onloadend = () => res(reader.result.split(',')[1]);
                    reader.readAsDataURL(p.blob);
                });
                return { filename: `snap_${p.timestamp}.jpg`, data: b64 };
            }));
            const payload = JSON.stringify({
                email:   settings.email,
                subject: `${settings.album || 'SnapMail'} — Part ${i+1} of ${batches.length}`,
                body:    `Batch ${i+1}/${batches.length} · ${images.length} photos · SnapMail PWA`,
                images
            });
            await new Promise((res, rej) => {
                const req = db.transaction("send_queue","readwrite").objectStore("send_queue")
                    .add({ id: crypto.randomUUID(), payload });
                req.onsuccess = res; req.onerror = rej;
            });
        }

        await new Promise((res, rej) => {
            const req = db.transaction("photos","readwrite").objectStore("photos").clear();
            req.onsuccess = res; req.onerror = rej;
        });
        const thumb = document.getElementById('last-thumb');
        thumb.style.backgroundImage = 'none';
        thumb.textContent = '📷';

        if ('serviceWorker' in navigator && 'SyncManager' in window) {
            try {
                const reg = await navigator.serviceWorker.ready;
                await reg.sync.register('send-photos');
                updateSendBtn('queued');
                return;
            } catch {}
        }

        const items = await dbReq(db.transaction("send_queue","readonly").objectStore("send_queue").getAll());
        for (let i = 0; i < items.length; i++) {
            updateSendBtn('sending', i + 1, items.length);
            try {
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: items[i].payload });
                await new Promise((res, rej) => {
                    const req = db.transaction("send_queue","readwrite").objectStore("send_queue").delete(items[i].id);
                    req.onsuccess = res; req.onerror = rej;
                });
            } catch (err) {
                updateSendBtn('error');
                alert(`❌ Batch ${i+1} failed: ${err.message}`);
                return;
            }
        }
        updateSendBtn('done');
    }

    function saveSettings() {
        const s = {
            email: document.getElementById('set-email').value.trim(),
            album: document.getElementById('set-album').value.trim()
        };
        if (!s.email) { alert("Email is required."); return; }
        localStorage.setItem('snapmail_settings', JSON.stringify(s));
        toggleOverlay('settings-overlay', false);
    }

    function toggleOverlay(id, show) {
        document.getElementById(id).classList.toggle('active', show);
    }

    window.addEventListener('load', async () => {
        await initDB();
        await initCamera();
        const saved = localStorage.getItem('snapmail_settings');
        if (!saved) {
            document.getElementById('settings-notice').style.display = 'block';
            toggleOverlay('settings-overlay', true);
        } else {
            const s = JSON.parse(saved);
            document.getElementById('set-email').value = s.email || '';
            document.getElementById('set-album').value = s.album || '';
        }
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
            navigator.serviceWorker.addEventListener('message', (e) => {
                if (e.data.type === 'SEND_COMPLETE') updateSendBtn('done');
                if (e.data.type === 'SEND_ERROR')    updateSendBtn('error');
            });
        }
    });

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') initCamera();
    });
</script>
</body>
</html>
